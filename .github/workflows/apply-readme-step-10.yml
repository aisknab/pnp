name: apply-reviewer-first-readme-step-10

on:
  push:
    branches:
      - docs/readme-step-10

permissions:
  contents: write

concurrency:
  group: apply-reviewer-first-readme-step-10
  cancel-in-progress: false

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message || '', 'reviewer-first README') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: docs/readme-step-10

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply Step 10 README rewrite
        run: python3 tools/apply-step10-readme.py

      - name: Check README structure and wording
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          python3 - <<'PY'
          from pathlib import Path

          text = Path('README.md').read_text()
          marker = text.index('## Public RunAll0 entry point')
          first = text[:marker]

          required = [
              'What is this repository?',
              'What extraordinary claim is being made?',
              'What is the current verification status?',
              'What can a hash check establish?',
              'What can the checker establish?',
              'What remains for external reviewers?',
              'How do I run the smallest verification?',
              'Where should reviewers start?',
              'npm run examples:minimal',
              'docs/reviewer_guide.md',
              'docs/proof_pipeline.md',
              'docs/terminology_crosswalk.md',
              'docs/trust_model.md',
              'docs/audit_questions.md',
              'docs/reproducibility.md',
          ]
          missing = [item for item in required if item not in first]
          if missing:
              raise SystemExit(f'missing first-screen reviewer content: {missing}')

          forbidden = [
              'P = NP is established',
              'P = NP has been proved',
              'unconditional P = NP',
              'the proof of P = NP is complete',
          ]
          present = [item for item in forbidden if item in text]
          if present:
              raise SystemExit(f'forbidden overclaiming wording: {present}')
          PY

      - name: Run README and public-surface tests
        run: |
          node --test \
            test/pcc-readme-release-boundary0.test.mjs \
            test/pcc-materialized-path-readme0.test.mjs \
            test/pcc-public-surface-freeze0.test.mjs \
            test/pcc-release-audit-readme-negative0.test.mjs

      - name: Run reviewer onboarding suites
        run: |
          npm run examples:minimal
          npm run test:negative

      - name: Run lightweight release audit
        run: |
          node --input-type=module <<'NODE'
          import {
            CheckReleaseAudit0,
            makeReleaseAuditConfig0,
          } from './pcc-release-audit0.mjs';

          const out = await CheckReleaseAudit0(makeReleaseAuditConfig0({
            runSyntaxCheck: false,
            runRunAll: false,
            runMutationCheck: false,
            runCliSmoke: false,
            runPublicSurfaceFreeze: true,
            runMaterializedPublicStatusGate: false,
          }));

          console.log(JSON.stringify({
            tag: out.tag,
            checker: out.checker,
            Coord: out.Coord ?? null,
            Path: out.Path ?? null,
            Witness: out.Witness ?? null,
          }, null, 2));

          if (out.tag !== 'accept') process.exit(1);
          NODE

      - name: Commit reviewer-first README
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: publish reviewer-first README"
          git push origin HEAD:docs/readme-step-10
