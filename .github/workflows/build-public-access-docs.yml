name: build-public-access-documentation-release

on:
  push:
    branches:
      - docs/public-access-report-7072f8d
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: public-access-docs-7072f8d
  cancel-in-progress: false

env:
  DOCS_TAG: final-pnp-proof-report-docs-hardened-7072f8d-public-access-sealed
  DOCS_DIR: docs-release/public-access-7072f8d
  SOURCE_DATE_EPOCH: "1781740800"
  FORCE_SOURCE_DATE: "1"
  TZ: UTC
  LC_ALL: C.UTF-8

jobs:
  build-and-seal:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Detect finalized release
        id: state
        shell: bash
        run: |
          if [[ -f "$DOCS_DIR/release-seal.json" ]]; then
            echo "finalized=true" >> "$GITHUB_OUTPUT"
          else
            echo "finalized=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install PDF inspection tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends poppler-utils

      - name: Install TeX toolchain
        if: steps.state.outputs.finalized != 'true'
        run: |
          sudo apt-get install -y --no-install-recommends \
            latexmk \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended
          pdflatex --version | head -n 4
          latexmk -v | head -n 4

      - name: Apply documentation-only manuscript patch
        if: steps.state.outputs.finalized != 'true'
        run: |
          patch --batch --forward -p1 < release-tools/canonical_report_public_access.patch
          git diff --check

      - name: Build canonical PDF twice
        id: build
        if: steps.state.outputs.finalized != 'true'
        continue-on-error: true
        shell: bash
        run: |
          set +e
          rm -rf /tmp/pnp-doc-build-1 /tmp/pnp-doc-build-2 deterministic-build-diagnostics
          mkdir -p /tmp/pnp-doc-build-1 /tmp/pnp-doc-build-2 deterministic-build-diagnostics
          cp canonical_proof_report.tex /tmp/pnp-doc-build-1/
          cp canonical_proof_report.tex /tmp/pnp-doc-build-2/

          (
            cd /tmp/pnp-doc-build-1
            latexmk -pdf -interaction=nonstopmode -halt-on-error canonical_proof_report.tex
          ) > deterministic-build-diagnostics/build-1.log 2>&1
          status1=$?

          (
            cd /tmp/pnp-doc-build-2
            latexmk -pdf -interaction=nonstopmode -halt-on-error canonical_proof_report.tex
          ) > deterministic-build-diagnostics/build-2.log 2>&1
          status2=$?

          status=0
          if [[ $status1 -ne 0 || $status2 -ne 0 ]]; then
            status=1
          fi

          if [[ -f /tmp/pnp-doc-build-1/canonical_proof_report.pdf ]]; then
            cp /tmp/pnp-doc-build-1/canonical_proof_report.pdf deterministic-build-diagnostics/build-1.pdf
          fi
          if [[ -f /tmp/pnp-doc-build-2/canonical_proof_report.pdf ]]; then
            cp /tmp/pnp-doc-build-2/canonical_proof_report.pdf deterministic-build-diagnostics/build-2.pdf
          fi

          if [[ -f /tmp/pnp-doc-build-1/canonical_proof_report.pdf && -f /tmp/pnp-doc-build-2/canonical_proof_report.pdf ]]; then
            sha256sum /tmp/pnp-doc-build-1/canonical_proof_report.pdf /tmp/pnp-doc-build-2/canonical_proof_report.pdf | tee deterministic-build-diagnostics/SHA256SUMS
            if cmp /tmp/pnp-doc-build-1/canonical_proof_report.pdf /tmp/pnp-doc-build-2/canonical_proof_report.pdf; then
              cp /tmp/pnp-doc-build-1/canonical_proof_report.pdf canonical_proof_report.pdf
            else
              cmp -l /tmp/pnp-doc-build-1/canonical_proof_report.pdf /tmp/pnp-doc-build-2/canonical_proof_report.pdf | head -n 80 > deterministic-build-diagnostics/cmp.txt || true
              status=1
            fi
          else
            status=1
          fi

          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload deterministic-build diagnostics
        if: steps.state.outputs.finalized != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pnp-documentation-build-diagnostics
          path: deterministic-build-diagnostics/
          if-no-files-found: error
          retention-days: 7

      - name: Require successful deterministic PDF build
        if: steps.state.outputs.finalized != 'true'
        shell: bash
        run: |
          test "${{ steps.build.outputs.status }}" = "0"

      - name: Finalize documentation release metadata
        if: steps.state.outputs.finalized != 'true'
        run: python3 release-tools/finalize-public-access-docs.py

      - name: Verify PDF structure and visible access wording
        shell: bash
        run: |
          test "$(pdfinfo canonical_proof_report.pdf | awk '/^Pages:/ {print $2}')" = "56"
          pdfinfo canonical_proof_report.pdf
          pdftotext canonical_proof_report.pdf /tmp/canonical-proof.txt
          grep -F "Documentation-only public-access revision" /tmp/canonical-proof.txt
          grep -F "https://github.com/aisknab/pnp" /tmp/canonical-proof.txt
          grep -F "final-pnp-proof-report-docs-hardened-7072f8d-public-access-sealed" /tmp/canonical-proof.txt
          ! grep -F "If repository access is restricted" /tmp/canonical-proof.txt
          ! grep -F "source-access" /tmp/canonical-proof.txt
          ! grep -F "artefact-access" /tmp/canonical-proof.txt

      - name: Verify documentation release seal and unchanged artefact identities
        run: node tools/check-documentation-release.mjs

      - name: Validate source/checker suite
        if: steps.state.outputs.finalized != 'true'
        run: |
          npm ci
          npm run validate

      - name: Enforce documentation-only changed-path boundary
        if: steps.state.outputs.finalized != 'true'
        shell: bash
        run: |
          git diff --check
          git status --short
          allowed='^(canonical_proof_report\.(pdf|tex)|README\.md|CURRENT_RELEASE\.md|REPRODUCE\.md|REVIEWER_MAP\.md|PUBLIC_ACCESS_REVISION\.md|docs-release/public-access-7072f8d/|tools/check-documentation-release\.mjs|release-tools/|\.github/workflows/build-public-access-docs\.yml)'
          git status --short | sed -E 's/^.. //' | while IFS= read -r file; do
            [[ "$file" =~ $allowed ]] || { echo "unexpected changed path: $file" >&2; exit 1; }
          done

      - name: Commit sealed documentation release
        if: steps.state.outputs.finalized != 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            canonical_proof_report.pdf \
            canonical_proof_report.tex \
            README.md \
            CURRENT_RELEASE.md \
            REPRODUCE.md \
            REVIEWER_MAP.md \
            PUBLIC_ACCESS_REVISION.md \
            docs-release/public-access-7072f8d \
            tools/check-documentation-release.mjs \
            release-tools \
            .github/workflows/build-public-access-docs.yml
          git commit -m "docs: seal public-access canonical report revision"
          git push origin HEAD:docs/public-access-report-7072f8d

      - name: Upload sealed documentation bundle
        uses: actions/upload-artifact@v4
        with:
          name: pnp-public-access-documentation-release
          path: |
            canonical_proof_report.pdf
            canonical_proof_report.tex
            docs-release/public-access-7072f8d/
            PUBLIC_ACCESS_REVISION.md
          if-no-files-found: error
          retention-days: 30
