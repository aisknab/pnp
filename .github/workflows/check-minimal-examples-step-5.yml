name: check-minimal-examples-step-5

on:
  push:
    branches:
      - examples/minimal-step-5
  pull_request:
    branches:
      - main

jobs:
  examples:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Check example syntax
        run: |
          node --check examples/minimal/lib.mjs
          node --check examples/minimal/run-all.mjs
          for file in examples/minimal/[0-9][0-9]-*.mjs; do
            node --check "$file"
          done
      - name: Run minimal reviewer examples
        run: npm run examples:minimal
      - name: Run directly related checker tests
        run: |
          node --test \
            test/pcc-core.test.mjs \
            test/pcc-core.negative.test.mjs \
            test/pcc-gpack0.test.mjs \
            test/pcc-final-framework0.test.mjs \
            test/pcc-pack-sufficiency0.test.mjs
