name: finalize-reviewer-negative-step-6

on:
  push:
    branches:
      - test/reviewer-negative-step-6

permissions:
  contents: write

concurrency:
  group: reviewer-negative-step-6-finalize
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: test/reviewer-negative-step-6

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Normalize the final test layout and command surface
        shell: bash
        run: |
          set -euo pipefail

          if [[ -f test/reviewer-negative-invariants.test.mjs ]]; then
            mv test/reviewer-negative-invariants.test.mjs test/pcc-core-negative.test.mjs
          fi

          python3 - <<'PY'
          from pathlib import Path

          replacements = {
              Path('package.json'): (
                  'node --test test/reviewer-negative-invariants.test.mjs',
                  'node --test test/pcc-core-negative.test.mjs',
              ),
              Path('pcc-public-surface-freeze0.mjs'): (
                  'node --test test/reviewer-negative-invariants.test.mjs',
                  'node --test test/pcc-core-negative.test.mjs',
              ),
          }

          for path, (old, new) in replacements.items():
              text = path.read_text()
              if old in text:
                  text = text.replace(old, new)
              if new not in text:
                  raise SystemExit(f'{path}: expected command target is missing')
              path.write_text(text)
          PY

          rm -f step6-release-audit-diagnostic.json
          git rm .github/workflows/check-reviewer-negative-step-6.yml
          git diff --check

      - name: Check syntax
        run: |
          node --check test/pcc-core-negative.test.mjs
          node --check pcc-public-surface-freeze0.mjs

      - name: Run named reviewer negative suite
        run: npm run test:negative

      - name: Run minimal reviewer examples
        run: npm run examples:minimal

      - name: Run full test suite
        run: npm test

      - name: Run current-tree release audit without heavyweight regeneration gates
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import {
            CheckReleaseAudit0,
            makeReleaseAuditConfig0,
          } from './pcc-release-audit0.mjs';

          const out = await CheckReleaseAudit0(makeReleaseAuditConfig0({
            runSyntaxCheck: false,
            runRunAll: false,
            runMutationCheck: false,
            runCliSmoke: false,
            runPublicSurfaceFreeze: true,
            runMaterializedPublicStatusGate: false,
          }));

          console.log(JSON.stringify({
            tag: out.tag,
            checker: out.checker,
            Coord: out.Coord ?? null,
            Path: out.Path ?? null,
            Witness: out.Witness ?? null,
          }, null, 2));

          if (out.tag !== 'accept') process.exit(1);
          NODE

      - name: Commit the validated final Step 6 change set
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test: finalize named negative invariant suite"
          git push origin HEAD:test/reviewer-negative-step-6
