name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  traceind-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          show-progress: false

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --silent

      - name: Run TraceInd unit suite
        run: |
          node --test \
            test/pcc-kernel-traceind-semantic0.test.mjs \
            test/pcc-kimpl-traceind-successor0.test.mjs

  online-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check syntax
        run: npm run check

      - name: Run TraceInd unit suite
        run: |
          node --test \
            test/pcc-kernel-traceind-semantic0.test.mjs \
            test/pcc-kimpl-traceind-successor0.test.mjs

      - name: Run targeted unit suite
        run: |
          node --test \
            test/pcc-core.test.mjs \
            test/pcc-kernel-semantic0.test.mjs \
            test/pcc-kernel-record-semantic0.test.mjs \
            test/pcc-kernel-dagind-semantic0.test.mjs \
            test/pcc-kernel-ledgerind-semantic0.test.mjs \
            test/pcc-kernel-obltopoind-semantic0.test.mjs \
            test/pcc-kernel-traceind-semantic0.test.mjs \
            test/pcc-kimpl0.test.mjs \
            test/pcc-kimpl-successor0.test.mjs \
            test/pcc-kimpl-record-successor0.test.mjs \
            test/pcc-kimpl-dagind-successor0.test.mjs \
            test/pcc-kimpl-ledgerind-successor0.test.mjs \
            test/pcc-kimpl-obltopoind-successor0.test.mjs \
            test/pcc-kimpl-traceind-successor0.test.mjs \
            test/pcc-kbundle-semantic-successor0.test.mjs \
            test/pcc-kbundle-ledgerind-successor0.test.mjs \
            test/pcc-kbundle-obltopoind-successor0.test.mjs \
            test/pcc-global-proof-dag0.test.mjs \
            test/pcc-global-proof-dag-semantic-successor0.test.mjs \
            test/pcc-global-proof-dag-ledgerind-successor0.test.mjs \
            test/pcc-global-proof-dag-obltopoind-successor0.test.mjs \
            test/pcc-gpack0.test.mjs \
            test/pcc-final-framework0.test.mjs \
            test/pcc-pack-sufficiency0.test.mjs

      - name: Run named negative suite
        run: npm run test:negative

      - name: Run minimal reviewer examples
        run: npm run examples:minimal

      - name: Run sealed-release reproducibility smoke
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse 'final-pnp-proof-report-hardened-7072f8d^{commit}')" = \
            "7072f8d0bda6d44d240f9bb3fad624fd357e1278"
          test "$(git rev-parse 'final-pnp-proof-report-artifacts-hardened-7072f8d-sealed^{commit}')" = \
            "9d1de19f827e5cb6880741352eb2349cbbb45994"
          node tools/reproducibility-smoke.mjs

      - name: Check reviewer documentation links
        run: node tools/check-doc-links.mjs

      - name: Run public surface smoke tests
        run: |
          node --test \
            test/pcc-public-api0.test.mjs \
            test/pcc-public-surface-freeze0.test.mjs \
            test/pcc-release-audit-public-surface-freeze0.test.mjs \
            test/pcc-release-audit-public-surface-summary-negative0.test.mjs

      - name: Run lightweight release audit
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import {
            CheckReleaseAudit0,
            makeReleaseAuditConfig0,
          } from './pcc-release-audit0.mjs';

          const out = await CheckReleaseAudit0(makeReleaseAuditConfig0({
            runSyntaxCheck: false,
            runRunAll: false,
            runMutationCheck: false,
            runCliSmoke: false,
            runPublicSurfaceFreeze: true,
            runMaterializedPublicStatusGate: false,
          }));

          console.log(JSON.stringify({
            tag: out.tag,
            checker: out.checker,
            Coord: out.Coord ?? null,
            Path: out.Path ?? null,
            Witness: out.Witness ?? null,
          }, null, 2));

          if (out.tag !== 'accept') process.exit(1);
          NODE

      - name: Verify tracked files were not rewritten
        run: |
          git diff --check
          git diff --exit-code
