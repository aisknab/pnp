name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  traceind-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          show-progress: false
          persist-credentials: false
          set-safe-directory: false

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Run TraceInd kernel tests
        run: node --test test/pcc-kernel-traceind-semantic0.test.mjs

      - name: Run TraceInd successor tests
        run: node --test test/pcc-kimpl-traceind-successor0.test.mjs

  finiteexhaust-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          show-progress: false
          persist-credentials: false
          set-safe-directory: false

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Run FiniteExhaust kernel tests
        run: node --test test/pcc-kernel-finiteexhaust-semantic0.test.mjs

      - name: Run FiniteExhaust successor tests
        run: node --test test/pcc-kimpl-finiteexhaust-successor0.test.mjs

      - name: Run FiniteExhaust KBundle tests
        run: node --test test/pcc-kbundle-finiteexhaust-successor0.test.mjs

      - name: Run FiniteExhaust global gate tests
        run: node --test test/pcc-global-proof-dag-finiteexhaust-successor0.test.mjs

  dpind-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          show-progress: false
          persist-credentials: false
          set-safe-directory: false

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Run DPInd kernel tests
        run: node --test test/pcc-kernel-dpind-semantic0.test.mjs

      - name: Run DPInd successor tests
        run: node --test test/pcc-kimpl-dpind-successor0.test.mjs

      - name: Run DPInd KBundle tests
        run: node --test test/pcc-kbundle-dpind-successor0.test.mjs

      - name: Run DPInd global gate tests
        run: node --test test/pcc-global-proof-dag-dpind-successor0.test.mjs

  hall-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          show-progress: false
          persist-credentials: false
          set-safe-directory: false

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Run Hall kernel tests
        run: node --test test/pcc-kernel-hall-semantic0.test.mjs

      - name: Run Hall successor tests
        run: node --test test/pcc-kimpl-hall-successor0.test.mjs

      - name: Run Hall KBundle tests
        run: node --test test/pcc-kbundle-hall-successor0.test.mjs

      - name: Run Hall global gate tests
        run: node --test test/pcc-global-proof-dag-hall-successor0.test.mjs

  rankind-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          show-progress: false
          persist-credentials: false
          set-safe-directory: false

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Run RankInd kernel tests
        run: node --test test/pcc-kernel-rankind-semantic0.test.mjs

      - name: Run RankInd successor tests
        run: node --test test/pcc-kimpl-rankind-successor0.test.mjs

      - name: Run RankInd KBundle tests
        run: node --test test/pcc-kbundle-rankind-successor0.test.mjs

      - name: Run RankInd global gate tests
        run: node --test test/pcc-global-proof-dag-rankind-successor0.test.mjs

  mincounterexample-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          show-progress: false
          persist-credentials: false
          set-safe-directory: false

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Run MinCounterexample kernel tests
        run: node --test test/pcc-kernel-mincounterexample-semantic0.test.mjs

      - name: Run MinCounterexample successor tests
        run: node --test test/pcc-kimpl-mincounterexample-successor0.test.mjs

      - name: Run MinCounterexample KBundle tests
        run: node --test test/pcc-kbundle-mincounterexample-successor0.test.mjs

      - name: Run MinCounterexample global gate tests
        run: node --test test/pcc-global-proof-dag-mincounterexample-successor0.test.mjs

  intarith-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          show-progress: false
          persist-credentials: false
          set-safe-directory: false

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Run IntArith kernel tests
        run: node --test test/pcc-kernel-intarith-semantic0.test.mjs

      - name: Run IntArith successor tests
        run: node --test test/pcc-kimpl-intarith-successor0.test.mjs

      - name: Run IntArith KBundle tests
        run: node --test test/pcc-kbundle-intarith-successor0.test.mjs

      - name: Run IntArith global gate tests
        run: node --test test/pcc-global-proof-dag-intarith-successor0.test.mjs

  transport-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          show-progress: false
          persist-credentials: false
          set-safe-directory: false

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Run Transport kernel tests
        run: node --test test/pcc-kernel-transport-semantic0.test.mjs

      - name: Run Transport successor tests
        run: node --test test/pcc-kimpl-transport-successor0.test.mjs

  online-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check syntax
        run: npm run check

      - name: Run TraceInd unit suite
        run: |
          node --test test/pcc-kernel-traceind-semantic0.test.mjs
          node --test test/pcc-kimpl-traceind-successor0.test.mjs

      - name: Run FiniteExhaust unit suite
        run: |
          node --test test/pcc-kernel-finiteexhaust-semantic0.test.mjs
          node --test test/pcc-kimpl-finiteexhaust-successor0.test.mjs
          node --test test/pcc-kbundle-finiteexhaust-successor0.test.mjs
          node --test test/pcc-global-proof-dag-finiteexhaust-successor0.test.mjs

      - name: Run DPInd unit suite
        run: |
          node --test test/pcc-kernel-dpind-semantic0.test.mjs
          node --test test/pcc-kimpl-dpind-successor0.test.mjs
          node --test test/pcc-kbundle-dpind-successor0.test.mjs
          node --test test/pcc-global-proof-dag-dpind-successor0.test.mjs

      - name: Run Hall unit suite
        run: |
          node --test test/pcc-kernel-hall-semantic0.test.mjs
          node --test test/pcc-kimpl-hall-successor0.test.mjs
          node --test test/pcc-kbundle-hall-successor0.test.mjs
          node --test test/pcc-global-proof-dag-hall-successor0.test.mjs

      - name: Run RankInd unit suite
        run: |
          node --test test/pcc-kernel-rankind-semantic0.test.mjs
          node --test test/pcc-kimpl-rankind-successor0.test.mjs
          node --test test/pcc-kbundle-rankind-successor0.test.mjs
          node --test test/pcc-global-proof-dag-rankind-successor0.test.mjs

      - name: Run MinCounterexample unit suite
        run: |
          node --test test/pcc-kernel-mincounterexample-semantic0.test.mjs
          node --test test/pcc-kimpl-mincounterexample-successor0.test.mjs
          node --test test/pcc-kbundle-mincounterexample-successor0.test.mjs
          node --test test/pcc-global-proof-dag-mincounterexample-successor0.test.mjs

      - name: Run IntArith unit suite
        run: |
          node --test test/pcc-kernel-intarith-semantic0.test.mjs
          node --test test/pcc-kimpl-intarith-successor0.test.mjs
          node --test test/pcc-kbundle-intarith-successor0.test.mjs
          node --test test/pcc-global-proof-dag-intarith-successor0.test.mjs

      - name: Run Transport unit suite
        run: |
          node --test test/pcc-kernel-transport-semantic0.test.mjs
          node --test test/pcc-kimpl-transport-successor0.test.mjs

      - name: Run targeted unit suite
        run: |
          node --test \
            test/pcc-core.test.mjs \
            test/pcc-kernel-semantic0.test.mjs \
            test/pcc-kernel-record-semantic0.test.mjs \
            test/pcc-kernel-dagind-semantic0.test.mjs \
            test/pcc-kernel-ledgerind-semantic0.test.mjs \
            test/pcc-kernel-obltopoind-semantic0.test.mjs \
            test/pcc-kernel-traceind-semantic0.test.mjs \
            test/pcc-kernel-finiteexhaust-semantic0.test.mjs \
            test/pcc-kernel-dpind-semantic0.test.mjs \
            test/pcc-kernel-hall-semantic0.test.mjs \
            test/pcc-kernel-rankind-semantic0.test.mjs \
            test/pcc-kernel-mincounterexample-semantic0.test.mjs \
            test/pcc-kernel-intarith-semantic0.test.mjs \
            test/pcc-kernel-transport-semantic0.test.mjs \
            test/pcc-kimpl0.test.mjs \
            test/pcc-kimpl-successor0.test.mjs \
            test/pcc-kimpl-record-successor0.test.mjs \
            test/pcc-kimpl-dagind-successor0.test.mjs \
            test/pcc-kimpl-ledgerind-successor0.test.mjs \
            test/pcc-kimpl-obltopoind-successor0.test.mjs \
            test/pcc-kimpl-traceind-successor0.test.mjs \
            test/pcc-kimpl-finiteexhaust-successor0.test.mjs \
            test/pcc-kimpl-dpind-successor0.test.mjs \
            test/pcc-kimpl-hall-successor0.test.mjs \
            test/pcc-kimpl-rankind-successor0.test.mjs \
            test/pcc-kimpl-mincounterexample-successor0.test.mjs \
            test/pcc-kimpl-intarith-successor0.test.mjs \
            test/pcc-kimpl-transport-successor0.test.mjs \
            test/pcc-kbundle-semantic-successor0.test.mjs \
            test/pcc-kbundle-ledgerind-successor0.test.mjs \
            test/pcc-kbundle-obltopoind-successor0.test.mjs \
            test/pcc-kbundle-traceind-successor0.test.mjs \
            test/pcc-kbundle-finiteexhaust-successor0.test.mjs \
            test/pcc-kbundle-dpind-successor0.test.mjs \
            test/pcc-kbundle-hall-successor0.test.mjs \
            test/pcc-kbundle-rankind-successor0.test.mjs \
            test/pcc-kbundle-mincounterexample-successor0.test.mjs \
            test/pcc-kbundle-intarith-successor0.test.mjs \
            test/pcc-global-proof-dag0.test.mjs \
            test/pcc-global-proof-dag-semantic-successor0.test.mjs \
            test/pcc-global-proof-dag-ledgerind-successor0.test.mjs \
            test/pcc-global-proof-dag-obltopoind-successor0.test.mjs \
            test/pcc-global-proof-dag-traceind-successor0.test.mjs \
            test/pcc-global-proof-dag-finiteexhaust-successor0.test.mjs \
            test/pcc-global-proof-dag-dpind-successor0.test.mjs \
            test/pcc-global-proof-dag-hall-successor0.test.mjs \
            test/pcc-global-proof-dag-rankind-successor0.test.mjs \
            test/pcc-global-proof-dag-mincounterexample-successor0.test.mjs \
            test/pcc-global-proof-dag-intarith-successor0.test.mjs \
            test/pcc-gpack0.test.mjs \
            test/pcc-final-framework0.test.mjs \
            test/pcc-pack-sufficiency0.test.mjs

      - name: Run named negative suite
        run: npm run test:negative

      - name: Run minimal reviewer examples
        run: npm run examples:minimal

      - name: Run sealed-release reproducibility smoke
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse 'final-pnp-proof-report-hardened-7072f8d^{commit}')" = \
            "7072f8d0bda6d44d240f9bb3fad624fd357e1278"
          test "$(git rev-parse 'final-pnp-proof-report-artifacts-hardened-7072f8d-sealed^{commit}')" = \
            "9d1de19f827e5cb6880741352eb2349cbbb45994"
          node tools/reproducibility-smoke.mjs

      - name: Check reviewer documentation links
        run: node tools/check-doc-links.mjs

      - name: Run public surface smoke tests
        run: |
          node --test \
            test/pcc-public-api0.test.mjs \
            test/pcc-public-surface-freeze0.test.mjs \
            test/pcc-release-audit-public-surface-freeze0.test.mjs \
            test/pcc-release-audit-public-surface-summary-negative0.test.mjs

      - name: Run lightweight release audit
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import {
            CheckReleaseAudit0,
            makeReleaseAuditConfig0,
          } from './pcc-release-audit0.mjs';

          const out = await CheckReleaseAudit0(makeReleaseAuditConfig0({
            runSyntaxCheck: false,
            runRunAll: false,
            runMutationCheck: false,
            runCliSmoke: false,
            runPublicSurfaceFreeze: true,
            runMaterializedPublicStatusGate: false,
          }));

          console.log(JSON.stringify({
            tag: out.tag,
            checker: out.checker,
            Coord: out.Coord ?? null,
            Path: out.Path ?? null,
            Witness: out.Witness ?? null,
          }, null, 2));

          if (out.tag !== 'accept') process.exit(1);
          NODE

      - name: Verify tracked files were not rewritten
        run: |
          git diff --check
          git diff --exit-code
