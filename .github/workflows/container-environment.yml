name: container-environment

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  container-environment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run container environment tests
        run: node --test audits/container-environment0.test.mjs
      - name: Build verifier container
        run: docker build -t pnp-container-environment-smoke .
      - name: Run verifier container smoke command
        run: docker run pnp-container-environment-smoke node --check pcc-core.mjs
