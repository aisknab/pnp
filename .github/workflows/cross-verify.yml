name: cross-verify

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  minimal-kernel-agreement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Cross-verify minimal-kernel agreement
        run: npm run cross-verify:json
      - name: Upload cross-verifier verdict
        uses: actions/upload-artifact@v4
        with:
          name: cross-verify-latest-verdict
          path: artifacts/cross-verify/latest-verdict.json
