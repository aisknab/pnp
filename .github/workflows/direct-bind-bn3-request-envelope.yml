name: direct-bind-bn3-request-envelope

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  direct-bind-bn3-request-envelope:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run BN3 direct-binding gap seed checker
        run: node pcc-direct-bind-bn3-request-envelope0.mjs --json
      - name: Run BN3 direct-binding gap seed tests
        run: node --test audits/direct-bind-bn3-request-envelope0.test.mjs
      - name: Upload BN3 direct-binding gap seed verdict
        uses: actions/upload-artifact@v4
        with:
          name: direct-bind-bn3-request-envelope-latest-verdict
          path: artifacts/direct-bind-bn3-request-envelope/latest-verdict.json
