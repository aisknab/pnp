name: direct-bind-bn6-hypergraph-packet

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  direct-bind-bn6-hypergraph-packet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run BN6 direct-binding gap seed checker
        run: node pcc-direct-bind-bn6-hypergraph-packet0.mjs --json
      - name: Run BN6 direct-binding gap seed tests
        run: node --test audits/direct-bind-bn6-hypergraph-packet0.test.mjs
      - name: Upload BN6 direct-binding gap seed verdict
        uses: actions/upload-artifact@v4
        with:
          name: direct-bind-bn6-hypergraph-packet-latest-verdict
          path: artifacts/direct-bind-bn6-hypergraph-packet/latest-verdict.json
