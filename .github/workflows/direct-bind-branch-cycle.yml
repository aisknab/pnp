name: direct-bind-branch-cycle

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  direct-bind-branch-cycle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run BC direct-binding seed checker
        run: node pcc-direct-bind-branch-cycle0.mjs --json
      - name: Run BC direct-binding seed tests
        run: node --test audits/direct-bind-branch-cycle0.test.mjs
      - name: Upload BC direct-binding seed verdict
        uses: actions/upload-artifact@v4
        with:
          name: direct-bind-branch-cycle-latest-verdict
          path: artifacts/direct-bind-branch-cycle/latest-verdict.json
