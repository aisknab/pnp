name: direct-bind-final-theorem-boundary

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  direct-bind-final-theorem-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run Final theorem boundary seed checker
        run: node pcc-direct-bind-final-theorem-boundary0.mjs --json
      - name: Run Final theorem boundary seed tests
        run: node --test audits/direct-bind-final-theorem-boundary0.test.mjs
      - name: Upload Final theorem boundary seed verdict
        uses: actions/upload-artifact@v4
        with:
          name: direct-bind-final-theorem-boundary-latest-verdict
          path: artifacts/direct-bind-final-theorem-boundary/latest-verdict.json
