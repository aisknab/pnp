name: direct-bind-finite-table

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  direct-bind-finite-table:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run FT direct-binding seed checker
        run: node pcc-direct-bind-finite-table0.mjs --json
      - name: Run FT direct-binding seed tests
        run: node --test audits/direct-bind-finite-table0.test.mjs
      - name: Upload FT direct-binding seed verdict
        uses: actions/upload-artifact@v4
        with:
          name: direct-bind-finite-table-latest-verdict
          path: artifacts/direct-bind-finite-table/latest-verdict.json
