name: direct-bind-frontier-faithful

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  direct-bind-frontier-faithful:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run NOR/FF direct-binding seed checker
        run: node pcc-direct-bind-frontier-faithful0.mjs --json
      - name: Run NOR/FF direct-binding seed tests
        run: node --test audits/direct-bind-frontier-faithful0.test.mjs
      - name: Upload NOR/FF direct-binding seed verdict
        uses: actions/upload-artifact@v4
        with:
          name: direct-bind-frontier-faithful-latest-verdict
          path: artifacts/direct-bind-frontier-faithful/latest-verdict.json
