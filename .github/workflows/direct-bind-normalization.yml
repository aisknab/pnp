name: direct-bind-normalization

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  direct-bind-normalization:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run N direct-binding seed checker
        run: node pcc-direct-bind-normalization0.mjs --json
      - name: Run N direct-binding seed tests
        run: node --test audits/direct-bind-normalization0.test.mjs
      - name: Upload N direct-binding seed verdict
        uses: actions/upload-artifact@v4
        with:
          name: direct-bind-normalization-latest-verdict
          path: artifacts/direct-bind-normalization/latest-verdict.json
