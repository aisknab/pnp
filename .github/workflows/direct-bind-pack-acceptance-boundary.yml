name: direct-bind-pack-acceptance-boundary

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  direct-bind-pack-acceptance-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node pcc-direct-bind-pack-acceptance-boundary0.mjs --json
      - run: node --test audits/direct-bind-pack-acceptance-boundary0.test.mjs
