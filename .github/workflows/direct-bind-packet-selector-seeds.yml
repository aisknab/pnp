name: direct-bind-packet-selector-seeds

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  direct-bind-packet-selector-seeds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run Packet direct-binding gap seed checker
        run: node pcc-direct-bind-packet-selector-seeds0.mjs --json
      - name: Run Packet direct-binding gap seed tests
        run: node --test audits/direct-bind-packet-selector-seeds0.test.mjs
      - name: Upload Packet direct-binding gap seed verdict
        uses: actions/upload-artifact@v4
        with:
          name: direct-bind-packet-selector-seeds-latest-verdict
          path: artifacts/direct-bind-packet-selector-seeds/latest-verdict.json
