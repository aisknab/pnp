name: direct-bind-pkgc-separating-consumers

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  direct-bind-pkgc-separating-consumers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run PkgC direct-binding gap seed checker
        run: node pcc-direct-bind-pkgc-separating-consumers0.mjs --json
      - name: Run PkgC direct-binding gap seed tests
        run: node --test audits/direct-bind-pkgc-separating-consumers0.test.mjs
      - name: Upload PkgC direct-binding gap seed verdict
        uses: actions/upload-artifact@v4
        with:
          name: direct-bind-pkgc-separating-consumers-latest-verdict
          path: artifacts/direct-bind-pkgc-separating-consumers/latest-verdict.json
