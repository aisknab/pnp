name: direct-bind-verifydw-soundness

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  direct-bind-verifydw-soundness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run E direct-binding seed checker
        run: node pcc-direct-bind-verifydw-soundness0.mjs --json
      - name: Run E direct-binding seed tests
        run: node --test audits/direct-bind-verifydw-soundness0.test.mjs
      - name: Upload E direct-binding seed verdict
        uses: actions/upload-artifact@v4
        with:
          name: direct-bind-verifydw-soundness-latest-verdict
          path: artifacts/direct-bind-verifydw-soundness/latest-verdict.json
