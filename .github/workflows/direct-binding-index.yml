name: direct-binding-index

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  direct-binding-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node pcc-direct-binding-index0.mjs --json
      - run: node --test audits/direct-binding-index0.test.mjs
