name: dpind-diagnostic

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  kernel-case:
    name: kernel-${{ matrix.case }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        include:
          - case: accept
            pattern: closes exact base
          - case: forward
            pattern: predecessor that is not an earlier
          - case: late-base
            pattern: base state placed after
          - case: index
            pattern: nonconsecutive evaluation index
          - case: omitted-arg
            pattern: omits a declared predecessor
          - case: hidden-opt
            pattern: hides minimization
          - case: dead-state
            pattern: does not contribute
          - case: caller-opt
            pattern: caller-supplied optimum
          - case: missing-dep
            pattern: missing one predecessor
          - case: substituted-dep
            pattern: substituted predecessor value
          - case: order
            pattern: out of state evaluation order
          - case: terminal
            pattern: mutated terminal dynamic
          - case: record-only
            pattern: only Record.intro
          - case: predecessor-consume
            pattern: predecessor rules cannot consume
          - case: readiness
            pattern: readiness removes DPInd
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: node --test --test-name-pattern "${{ matrix.pattern }}" test/pcc-kernel-dpind-semantic0.test.mjs

  successor-case:
    name: successor-${{ matrix.case }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        include:
          - case: accept
            pattern: accepts valid partial
          - case: final-purpose
            pattern: rejects final-theorem purpose
          - case: purpose-reuse
            pattern: development-purpose record before reuse
          - case: explicit-final
            pattern: explicit final use
          - case: caller-ready
            pattern: caller-supplied readiness
          - case: policy
            pattern: weakened release policy
          - case: stale
            pattern: stale FiniteExhaust-only
          - case: invalid-link
            pattern: invalid predecessor-value linkage
          - case: legacy
            pattern: retains the legacy
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: node --test --test-name-pattern "${{ matrix.pattern }}" test/pcc-kimpl-dpind-successor0.test.mjs
