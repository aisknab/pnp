name: external-review-finding-file-hashes-verification

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: external-review-finding-file-hashes-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          show-progress: false
          persist-credentials: false
          set-safe-directory: false

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Verify signed finding intake hashes
        run: sha256sum -c external-review/findings/SHA256SUMS

      - name: Check external-review finding-file hash ledger syntax
        run: node --check pcc-external-review-finding-file-hash-ledger0.mjs

      - name: Run external-review finding-file hash ledger tests
        run: node --test test/pcc-external-review-finding-file-hash-ledger0.test.mjs
