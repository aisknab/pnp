name: finalize-code-comments-step-9

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: finalize-code-comments-step-9
  cancel-in-progress: true

jobs:
  finalize:
    if: ${{ github.head_ref == 'docs/code-comments-step-9' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: docs/code-comments-step-9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Apply reviewer comments and remove temporary tooling
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/apply-step9-comments.py
          git rm tools/apply-step9-comments.py
          git rm .github/workflows/finalize-code-comments-step-9.yml
          git diff --check

      - name: Prove the final JavaScript diff is comment-only
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          python3 - <<'PY'
          import subprocess

          files = [
              'pcc-verifier-frag0.mjs',
              'pcc-core.mjs',
              'pcc-rows0.mjs',
              'pcc-kimpl0.mjs',
              'pcc-global-firewalls0.mjs',
              'pcc-local-packages0.mjs',
              'pcc-global-proof-dag0.mjs',
              'pcc-gpack0.mjs',
              'pcc-final-framework0.mjs',
              'pcc-final0.mjs',
              'pcc-pack-sufficiency0.mjs',
              'pcc-check-pcc-pack-exp0.mjs',
              'pcc-generate-pcc-pack0.mjs',
              'pcc-accept-run0.mjs',
              'pcc-final-proof-report0.mjs',
          ]

          result = subprocess.run(
              ['git', 'diff', '--unified=0', 'origin/main', '--', *files],
              check=True,
              text=True,
              capture_output=True,
          )

          additions = 0
          for line in result.stdout.splitlines():
              if line.startswith(('diff --git ', 'index ', '@@ ', '--- ', '+++ ')):
                  continue
              if line.startswith('-'):
                  raise SystemExit(f'non-comment deletion detected: {line}')
              if line.startswith('+'):
                  additions += 1
                  content = line[1:]
                  stripped = content.lstrip()
                  if not stripped:
                      continue
                  if stripped.startswith(('/**', '*', '*/', '//')):
                      continue
                  raise SystemExit(f'non-comment addition detected: {line}')

          if additions == 0:
              raise SystemExit('expected reviewer comments, but no additions were found')

          print(f'comment-only diff verified: {additions} added lines')
          PY

      - name: Check syntax of every commented module
        shell: bash
        run: |
          set -euo pipefail
          for file in \
            pcc-verifier-frag0.mjs \
            pcc-core.mjs \
            pcc-rows0.mjs \
            pcc-kimpl0.mjs \
            pcc-global-firewalls0.mjs \
            pcc-local-packages0.mjs \
            pcc-global-proof-dag0.mjs \
            pcc-gpack0.mjs \
            pcc-final-framework0.mjs \
            pcc-final0.mjs \
            pcc-pack-sufficiency0.mjs \
            pcc-check-pcc-pack-exp0.mjs \
            pcc-generate-pcc-pack0.mjs \
            pcc-accept-run0.mjs \
            pcc-final-proof-report0.mjs
          do
            node --check "$file"
          done

      - name: Install the pinned package metadata
        run: npm ci

      - name: Run reviewer-facing examples and negative invariants
        run: |
          npm run examples:minimal
          npm run test:negative

      - name: Run directly related checker tests
        run: |
          node --test \
            test/pcc-verifier-frag0.test.mjs \
            test/pcc-core.test.mjs \
            test/pcc-core.negative.test.mjs \
            test/pcc-rows0.test.mjs \
            test/pcc-kimpl0.test.mjs \
            test/pcc-global-firewalls0.test.mjs \
            test/pcc-local-packages0.test.mjs \
            test/pcc-global-proof-dag0.test.mjs \
            test/pcc-gpack0.test.mjs \
            test/pcc-final-framework0.test.mjs \
            test/pcc-final0.test.mjs \
            test/pcc-pack-sufficiency0.test.mjs \
            test/pcc-check-pcc-pack-exp0.test.mjs \
            test/pcc-generate-pcc-pack0.test.mjs \
            test/pcc-accept-run0.test.mjs \
            test/pcc-final-proof-report0.test.mjs

      - name: Run complete current-tree validation
        run: npm run validate

      - name: Commit the validated comment-only change
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: explain critical checker boundaries in source"
          git push origin HEAD:docs/code-comments-step-9
