name: global-final-complexity-verification

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: global-final-complexity-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  global-final-complexity-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          show-progress: false
          persist-credentials: false
          set-safe-directory: false

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Check phase-39 module syntax
        run: |
          node --check pcc-complexity-bridge0.mjs
          node --check pcc-global-final-complexity-semantic0.mjs
          node --check pcc-global-proof-dag-final-complexity-successor0.mjs

      - name: Run guarded complexity bridge tests
        run: |
          node --test --test-reporter=spec test/pcc-complexity-bridge0.test.mjs \
            > phase39-bridge.log 2>&1
          cat phase39-bridge.log

      - name: Run guarded final complexity semantic tests
        run: |
          node --test --test-reporter=spec test/pcc-global-final-complexity-semantic0.test.mjs \
            > phase39-semantic.log 2>&1
          cat phase39-semantic.log

      - name: Run guarded final complexity successor tests
        run: |
          node --test --test-reporter=spec test/pcc-global-proof-dag-final-complexity-successor0.test.mjs \
            > phase39-successor.log 2>&1
          cat phase39-successor.log

      - name: Upload phase-39 diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase39-diagnostics
          path: phase39-*.log
          if-no-files-found: warn
          retention-days: 3
