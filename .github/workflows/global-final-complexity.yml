name: global-final-complexity-verification

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: global-final-complexity-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  global-final-complexity-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          show-progress: false
          persist-credentials: false
          set-safe-directory: false

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Check phase-39 module syntax
        run: |
          node --check pcc-complexity-bridge0.mjs
          node --check pcc-global-final-complexity-semantic0.mjs
          node --check pcc-global-proof-dag-final-complexity-successor0.mjs

      - name: Run guarded complexity bridge tests
        run: node --test test/pcc-complexity-bridge0.test.mjs

      - name: Run guarded final complexity semantic tests
        run: node --test test/pcc-global-final-complexity-semantic0.test.mjs

      - name: Run guarded final complexity successor tests
        run: node --test test/pcc-global-proof-dag-final-complexity-successor0.test.mjs
