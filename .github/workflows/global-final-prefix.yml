name: global-final-prefix-verification

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: global-final-prefix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  global-final-prefix-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          show-progress: false
          persist-credentials: false
          set-safe-directory: false

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Check phase-37 module syntax
        run: |
          node --check pcc-global-final-prefix-contract0.mjs
          node --check pcc-global-final-prefix-derive0.mjs
          node --check pcc-global-final-prefix-semantic0.mjs
          node --check pcc-global-final-prefix-overlay0.mjs
          node --check pcc-global-proof-dag-final-prefix-successor0.mjs

      - name: Run bounded final-prefix semantic tests
        run: |
          node --test \
            test/pcc-global-final-prefix-semantic0.test.mjs \
            test/pcc-global-final-prefix-semantic-negative0.test.mjs

      - name: Run bounded final-prefix successor tests
        run: |
          node --test \
            test/pcc-global-proof-dag-final-prefix-successor0.test.mjs \
            test/pcc-global-proof-dag-final-prefix-gate0.test.mjs \
            test/pcc-global-proof-dag-final-prefix-bindings0.test.mjs \
            test/pcc-global-proof-dag-final-prefix-negative0.test.mjs
