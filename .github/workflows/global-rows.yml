name: global-rows-verification

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: global-rows-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  global-rows-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          show-progress: false
          persist-credentials: false
          set-safe-directory: false

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Run scoped global row semantic checker tests
        shell: bash
        run: |
          set +e
          node --test test/pcc-global-row-semantic0.test.mjs > /tmp/global-row-semantic.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            cat /tmp/global-row-semantic.log
          fi
          exit "$status"

      - name: Run scoped global row successor tests
        shell: bash
        run: |
          set +e
          node --test test/pcc-global-proof-dag-row-successor0.test.mjs > /tmp/global-row-successor.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            cat /tmp/global-row-successor.log
          fi
          exit "$status"
