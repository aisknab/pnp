name: independent-python-minimal-kernel

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify-minimal-kernel:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run independent Python minimal-kernel verifier
        run: python independent-verifiers/python/verify_minimal_kernel.py --json
      - name: Run verifier unit tests
        run: python -m unittest discover independent-verifiers/python -p '*_test.py'
