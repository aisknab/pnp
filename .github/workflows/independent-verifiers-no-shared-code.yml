name: independent-verifiers-no-shared-code

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  audit-no-shared-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Audit independent verifier no-shared-code policy
        run: npm run independent:no-shared-code
      - name: Run no-shared-code audit tests
        run: node --test test/audit-independent-verifiers-no-shared-code.test.mjs
      - name: Upload no-shared-code verdict
        uses: actions/upload-artifact@v4
        with:
          name: independent-verifiers-no-shared-code-verdict
          path: artifacts/independent-verifiers/no-shared-code/latest-verdict.json
