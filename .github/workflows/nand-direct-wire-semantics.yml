name: nand-direct-wire-semantics

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  nand-direct-wire-semantics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run NAND direct-wire semantics checker
        run: npm run semantics:nand
      - name: Run NAND direct-wire semantics tests
        run: node --test audits/nand-direct-wire-semantics0.test.mjs
      - name: Upload NAND direct-wire semantics verdict
        uses: actions/upload-artifact@v4
        with:
          name: nand-direct-wire-semantics-latest-verdict
          path: artifacts/nand-direct-wire-semantics/latest-verdict.json
