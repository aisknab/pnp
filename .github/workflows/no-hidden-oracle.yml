name: no-hidden-oracle

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  no-hidden-oracle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run no-hidden-oracle audit
        run: npm run audit:no-hidden-oracle
      - name: Run no-hidden-oracle tests
        run: node --test audits/no-hidden-oracle0.test.mjs
      - name: Upload no-hidden-oracle verdict
        uses: actions/upload-artifact@v4
        with:
          name: no-hidden-oracle-latest-verdict
          path: artifacts/no-hidden-oracle/latest-verdict.json
