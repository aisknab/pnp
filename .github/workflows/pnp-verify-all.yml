name: pnp-verify-all

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  pnp-verify-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run one-command PNP verifier
        run: npm run pnp:verify
      - name: Upload PNP verify-all verdict
        uses: actions/upload-artifact@v4
        with:
          name: pnp-verify-all-latest-verdict
          path: artifacts/pnp-verify-all/latest-verdict.json
