name: public-emission-gate-verification

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: public-emission-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  public-emission-gate-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          show-progress: false
          persist-credentials: false
          set-safe-directory: false

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Check public emission gate module syntax
        run: |
          node --check pcc-public-emission-gate0.mjs
          node --check pcc-global-proof-dag-public-emission-successor0.mjs

      - name: Run public emission gate tests
        run: node --test test/pcc-public-emission-gate0.test.mjs

      - name: Run public emission successor tests
        run: node --test test/pcc-global-proof-dag-public-emission-successor0.test.mjs
