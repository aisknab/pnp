name: public-review-boundary

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  public-review-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run public review boundary checker
        run: node pcc-public-review-boundary0.mjs --json
      - name: Run public review boundary tests
        run: node --test audits/public-review-boundary0.test.mjs
      - name: Upload public review boundary verdict
        uses: actions/upload-artifact@v4
        with:
          name: public-review-boundary-latest-verdict
          path: artifacts/public-review-boundary/latest-verdict.json
