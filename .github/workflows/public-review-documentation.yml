name: public-review-documentation-verification

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: public-review-documentation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          show-progress: false
          persist-credentials: false
          set-safe-directory: false

      - name: Verify sanitized public-review root report
        run: |
          grep -F 'PNP-HISTORICAL-REPORT-SANITIZED-2026-06-27-01' canonical_proof_report.tex
          grep -F 'Public theorem emission is disabled' canonical_proof_report.tex
          grep -F 'publicTheoremEmissionAllowed = false' canonical_proof_report.tex
          grep -F 'finalTheoremReady = false' canonical_proof_report.tex
          grep -F 'Release.UnrestrictedFinalSoundness' canonical_proof_report.tex
          grep -F 'ExternalReview.Acceptance' canonical_proof_report.tex
          ! grep -F 'This paper proves' canonical_proof_report.tex
          ! grep -F '\begin{theorem}[Final accepted finite-certificate theorem]' canonical_proof_report.tex
          node pcc-historical-report-supersession0.mjs --json
