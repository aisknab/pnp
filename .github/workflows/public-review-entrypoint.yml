name: public-review-entrypoint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  public-review-entrypoint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run public review entrypoint checker
        run: node pcc-public-review-entrypoint0.mjs --json
      - name: Run public review entrypoint tests
        run: node --test audits/public-review-entrypoint0.test.mjs
      - name: Upload public review entrypoint verdict
        uses: actions/upload-artifact@v4
        with:
          name: public-review-entrypoint-latest-verdict
          path: artifacts/public-review-entrypoint/latest-verdict.json
