name: public-review-handoff

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  public-review-handoff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run public review handoff checker
        run: node pcc-public-review-handoff0.mjs --json
      - name: Run public review handoff tests
        run: node --test audits/public-review-handoff0.test.mjs
      - name: Upload public review handoff verdict
        uses: actions/upload-artifact@v4
        with:
          name: public-review-handoff-latest-verdict
          path: artifacts/public-review-handoff/latest-verdict.json
