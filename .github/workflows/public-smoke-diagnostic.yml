name: public-smoke-diagnostic

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  public-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          show-progress: false
      - name: Isolate public surface smoke
        shell: bash
        run: |
          set +e
          node --test \
            test/pcc-public-api0.test.mjs \
            test/pcc-public-surface-freeze0.test.mjs \
            test/pcc-release-audit-public-surface-freeze0.test.mjs \
            test/pcc-release-audit-public-surface-summary-negative0.test.mjs > public-smoke.log 2>&1
          code=$?
          sed -n '1,220p' public-smoke.log
          exit "$code"
