name: public-surface-diagnostic

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-case:
    name: public-${{ matrix.case }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - case: freeze-executes
            file: test/pcc-release-audit-public-surface-freeze0.test.mjs
            pattern: executes the public surface freeze phase
          - case: freeze-skip
            file: test/pcc-release-audit-public-surface-freeze0.test.mjs
            pattern: can skip public surface freeze
          - case: freeze-reject
            file: test/pcc-release-audit-public-surface-freeze0.test.mjs
            pattern: