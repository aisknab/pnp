name: reflection-verification

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: reflection-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  reflection-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          show-progress: false
          persist-credentials: false
          set-safe-directory: false

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Run semantic reflection checker tests
        run: node --test test/pcc-reflection-semantic0.test.mjs

      - name: Run semantic reflection KBundle tests
        run: node --test test/pcc-kbundle-reflection-successor0.test.mjs

      - name: Run semantic reflection global gate tests
        run: node --test test/pcc-global-proof-dag-reflection-successor0.test.mjs
