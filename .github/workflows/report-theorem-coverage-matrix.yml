name: report-theorem-coverage-matrix

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  report-theorem-coverage-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run report theorem coverage matrix checker
        run: node pcc-report-theorem-coverage-matrix0.mjs --json
      - name: Run report theorem coverage matrix tests
        run: node --test audits/report-theorem-coverage-matrix0.test.mjs
      - name: Upload report theorem coverage matrix verdict
        uses: actions/upload-artifact@v4
        with:
          name: report-theorem-coverage-matrix-latest-verdict
          path: artifacts/report-theorem-coverage-matrix/latest-verdict.json
