name: rule-family-coverage

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rule-family-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run rule-family coverage checker
        run: npm run rule-family:coverage
      - name: Run rule-family coverage tests
        run: node --test audits/rule-family-coverage0.test.mjs
      - name: Upload rule-family coverage verdict
        uses: actions/upload-artifact@v4
        with:
          name: rule-family-coverage-latest-verdict
          path: artifacts/rule-family-coverage/latest-verdict.json
